<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌪️ VORTEX</title>
    <style>
        /* ============================================================
           БАЗОВАЯ ОПТИМИЗАЦИЯ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            /* отключаем скролл всей страницы */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, color 0.3s ease;
            /* ВКЛЮЧАЕМ АППАРАТНОЕ УСКОРЕНИЕ */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        /* ============================================================
           ПЕРЕМЕННЫЕ
           ============================================================ */
        :root {
            --bg: #f0f2f8;
            --card: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.25);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            --text: #0f1419;
            --text-secondary: #536471;
            --text-muted: #8899a6;
            --primary: #6c5ce7;
            --primary-glow: rgba(108, 92, 231, 0.3);
            --primary-light: #a29bfe;
            --success: #00b894;
            --success-glow: rgba(0, 184, 148, 0.3);
            --danger: #ff6b6b;
            --radius: 28px;
            --radius-sm: 16px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        [data-theme="dark"] {
            --bg: #0a0e1a;
            --card: rgba(16, 22, 40, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            --text: #e8edf5;
            --text-secondary: #8899b0;
            --text-muted: #5a6480;
            --primary: #a29bfe;
            --primary-glow: rgba(162, 155, 254, 0.25);
        }

        /* ============================================================
           ВОДОВОРОТ (ОПТИМИЗИРОВАННЫЙ)
           ============================================================ */
        .vortex-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            will-change: transform;
            /* подсказка браузеру */
            background:
                radial-gradient(ellipse at 30% 20%, rgba(108, 92, 231, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 184, 148, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(162, 155, 254, 0.04) 0%, transparent 60%);
            animation: vortexBg 20s linear infinite;
        }

        @keyframes vortexBg {
            0% {
                transform: rotate(0deg) scale(1);
            }
            100% {
                transform: rotate(360deg) scale(1.1);
            }
        }

        /* ============================================================
           ШАПКА (ОПТИМИЗИРОВАННАЯ)
           ============================================================ */
        .header {
            position: relative;
            z-index: 10;
            padding: 16px 20px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--card);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--card-border);
            transition: background var(--transition), border var(--transition);
            will-change: background, border;
            /* аппаратное ускорение */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .vortex-logo {
            width: 44px;
            height: 44px;
            position: relative;
            flex-shrink: 0;
            will-change: transform;
        }

        .vortex-logo svg {
            width: 100%;
            height: 100%;
            animation: spinVortex 4s linear infinite;
            filter: drop-shadow(0 0 20px var(--primary-glow));
            will-change: transform;
        }

        @keyframes spinVortex {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .vortex-logo .ring {
            stroke: var(--primary);
            stroke-width: 2;
            fill: none;
            opacity: 0.6;
        }

        .vortex-logo .ring-inner {
            stroke: var(--primary-light);
            stroke-width: 1.5;
            fill: none;
            opacity: 0.3;
            animation: spinReverse 3s linear infinite;
            will-change: transform;
        }

        @keyframes spinReverse {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(-360deg);
            }
        }

        .vortex-logo .dot {
            fill: var(--primary);
            animation: pulseDot 1.5s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.6);
            }
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #6c5ce7);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            text-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(108, 92, 231, 0.15);
            position: relative;
            will-change: background-position;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .brand-tag {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            -webkit-text-fill-color: var(--text-muted);
            margin-left: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: var(--card);
            backdrop-filter: blur(10px);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text);
            will-change: transform, background;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .header-btn:active {
            transform: scale(0.92);
        }

        /* ============================================================
           КАРТА (ОПТИМИЗИРОВАННАЯ)
           ============================================================ */
        .map-wrapper {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 48vh;
            margin: 12px 16px 0;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg);
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            transition: background var(--transition), border var(--transition);
            /* ВКЛЮЧАЕМ АППАРАТНОЕ УСКОРЕНИЕ ДЛЯ КАРТЫ */
            transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.6s ease;
            /* отключаем анимацию если она тормозит */
            will-change: opacity;
            /* подсказка для браузера */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* Эффекты карты — оставляем, но делаем легче */
        .map-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 20%, transparent 60%, var(--bg) 100%),
                radial-gradient(ellipse at 70% 80%, transparent 60%, var(--bg) 100%);
            opacity: 0.2;
            transition: opacity var(--transition);
            border-radius: var(--radius);
            will-change: opacity;
        }

        .map-wrapper::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            z-index: 1;
            pointer-events: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), transparent 50%, var(--primary-light));
            opacity: 0.04;
            transition: opacity var(--transition);
            will-change: opacity;
        }

        .map-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            padding: 30px;
            text-align: center;
        }

        .map-placeholder .icon {
            font-size: 56px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .map-placeholder .title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* ============================================================
           ПЛАВАЮЩАЯ ПАНЕЛЬ
           ============================================================ */
        .floating-panel {
            position: relative;
            z-index: 5;
            margin: -20px 16px 0;
            padding: 16px 20px;
            background: var(--card);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border-radius: var(--radius);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
            transition: background var(--transition), border var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            will-change: background, border;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-info .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            will-change: transform, box-shadow;
        }

        .dot.inactive {
            background: var(--text-muted);
        }
        .dot.active {
            background: var(--success);
            box-shadow: 0 0 20px var(--success-glow);
            animation: pulseDot 2s infinite;
        }
        .dot.error {
            background: var(--danger);
        }

        .status-info .label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .coords-display {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 30px;
            transition: background var(--transition);
            will-change: background;
        }

        /* ============================================================
           ССЫЛКА
           ============================================================ */
        .link-box {
            position: relative;
            z-index: 5;
            margin: 10px 16px 0;
            padding: 12px 16px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            display: none;
            transition: background var(--transition), border var(--transition);
            will-change: background, border;
        }

        .link-box.show {
            display: block;
        }

        .link-box .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .link-box .url {
            color: var(--primary);
            margin-top: 4px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            word-break: break-all;
        }

        /* ============================================================
           КНОПКИ (ОПТИМИЗИРОВАННЫЕ)
           ============================================================ */
        .actions {
            position: relative;
            z-index: 5;
            padding: 12px 16px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            will-change: transform;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            flex: 1;
            min-width: 56px;
            letter-spacing: 0.2px;
            will-change: transform, box-shadow;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 24px var(--primary-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: rgba(255, 107, 107, 0.12);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.15);
        }

        .btn-outline {
            background: var(--card);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            flex: 0.5;
        }

        .btn-google {
            background: #ea4335;
            color: #fff;
            flex: 0.5;
            box-shadow: 0 4px 20px rgba(234, 67, 53, 0.2);
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform, opacity;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
        }
        .toast.error {
            border-color: var(--danger);
        }
        .toast.info {
            border-color: var(--primary);
        }

        /* ============================================================
           АДАПТИВ (ОПТИМИЗИРОВАННЫЙ)
           ============================================================ */
        @media (max-width: 500px) {
            .header {
                padding: 12px 16px 10px;
            }
            .brand-name {
                font-size: 20px;
                letter-spacing: 1px;
            }
            .brand-tag {
                font-size: 9px;
                letter-spacing: 2px;
            }
            .vortex-logo {
                width: 36px;
                height: 36px;
            }
            .map-wrapper {
                margin: 8px 12px 0;
                min-height: 40vh;
                border-radius: 20px;
            }
            .floating-panel {
                margin: -14px 12px 0;
                padding: 12px 16px;
                border-radius: 20px;
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .status-info .label {
                font-size: 13px;
            }
            .coords-display {
                font-size: 12px;
                padding: 3px 10px;
            }
            .actions {
                padding: 8px 12px 16px;
                gap: 8px;
            }
            .btn {
                font-size: 13px;
                padding: 12px 16px;
                border-radius: 40px;
            }
            .link-box {
                margin: 8px 12px 0;
                padding: 10px 14px;
            }
            .toast {
                bottom: 80px;
                padding: 12px 20px;
                font-size: 13px;
                border-radius: 40px;
            }
        }

        @media (min-height: 750px) {
            .map-wrapper {
                min-height: 55vh;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================================
    ФОН
    ============================================================ -->
    <div class="vortex-bg"></div>

    <!-- ============================================================
    ШАПКА
    ============================================================ -->
    <div class="header">
        <div class="header-left">
            <div class="vortex-logo">
                <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
                    <circle class="ring" cx="22" cy="22" r="18"/>
                    <circle class="ring" cx="22" cy="22" r="14" stroke-dasharray="20 30"/>
                    <circle class="ring" cx="22" cy="22" r="10" stroke-dasharray="10 40"/>
                    <circle class="ring-inner" cx="22" cy="22" r="6"/>
                    <circle class="ring-inner" cx="22" cy="22" r="3"/>
                    <circle class="dot" cx="22" cy="22" r="2.5"/>
                    <circle class="dot" cx="22" cy="6" r="1.2" style="animation-delay: 0.2s;"/>
                    <circle class="dot" cx="22" cy="38" r="1.2" style="animation-delay: 0.6s;"/>
                    <circle class="dot" cx="6" cy="22" r="1.2" style="animation-delay: 0.4s;"/>
                    <circle class="dot" cx="38" cy="22" r="1.2" style="animation-delay: 0.8s;"/>
                </svg>
            </div>
            <div>
                <span class="brand-name">VORTEX</span>
                <span class="brand-tag">• трекер</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" id="themeToggle" onclick="toggleTheme()" aria-label="Сменить тему">🌙</button>
        </div>
    </div>

    <!-- ============================================================
    КАРТА
    ============================================================ -->
    <div class="map-wrapper" id="mapWrapper">
        <div class="map-placeholder" id="mapPlaceholder">
            <div class="icon">🌪️</div>
            <div class="title">Запустите вихрь</div>
            <div style="font-size:13px;opacity:0.4;margin-top:4px;">Нажмите «Начать» чтобы войти в водоворот событий</div>
        </div>
        <iframe id="mapFrame" style="display:none;" loading="lazy" allow="geolocation"></iframe>
    </div>

    <!-- ============================================================
    ПАНЕЛЬ СТАТУСА
    ============================================================ -->
    <div class="floating-panel">
        <div class="status-info">
            <span class="dot inactive" id="statusDot"></span>
            <span class="label" id="statusText">Ожидание запуска</span>
        </div>
        <span class="coords-display" id="coordsDisplay">—</span>
    </div>

    <!-- ============================================================
    ССЫЛКА
    ============================================================ -->
    <div class="link-box" id="linkBox">
        <div class="label">🌀 Вихревая ссылка</div>
        <div class="url" id="trackLink"></div>
    </div>

    <!-- ============================================================
    КНОПКИ
    ============================================================ -->
    <div class="actions">
        <button class="btn btn-primary" id="startBtn" onclick="startTracking()">🌪️ Начать</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopTracking()" style="display:none;">⏹ Стоп</button>
        <button class="btn btn-outline" id="copyBtn" onclick="copyLink()" style="display:none;" aria-label="Скопировать ссылку">📋</button>
        <button class="btn btn-google" id="googleBtn" onclick="openGoogleMaps()" style="display:none;" aria-label="Открыть в Google Maps">🗺️</button>
    </div>

    <!-- ============================================================
    TOAST
    ============================================================ -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================
    SCRIPT (ОПТИМИЗИРОВАННЫЙ)
    ============================================================ -->
    <script>
        'use strict';

        // ============================================================
        // 1. ТЁМНАЯ ТЕМА
        // ============================================================
        const themeToggle = document.getElementById('themeToggle');

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        // ============================================================
        // 2. DOM-элементы (кешируем для скорости)
        // ============================================================
        const $ = (id) => document.getElementById(id);
        const mapPlaceholder = $('mapPlaceholder');
        const mapFrame = $('mapFrame');
        const coordsDisplay = $('coordsDisplay');
        const statusText = $('statusText');
        const statusDot = $('statusDot');
        const startBtn = $('startBtn');
        const stopBtn = $('stopBtn');
        const copyBtn = $('copyBtn');
        const googleBtn = $('googleBtn');
        const linkBox = $('linkBox');
        const trackLink = $('trackLink');
        const toast = $('toast');

        // ============================================================
        // 3. ПЕРЕМЕННЫЕ СОСТОЯНИЯ
        // ============================================================
        let watchId = null;
        let isTracking = false;
        let lastCoords = null;
        let lastNotifyCoords = null;
        let toastTimer = null;

        // ============================================================
        // 4. TOAST (оптимизированный)
        // ============================================================
        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // 5. СТАТУС
        // ============================================================
        function updateStatus(text, state) {
            statusText.textContent = text;
            statusDot.className = 'dot ' + state;
        }

        // ============================================================
        // 6. КАРТА (оптимизированная)
        // ============================================================
        function showMap(lat, lon) {
            mapPlaceholder.style.display = 'none';
            mapFrame.style.display = 'block';

            const zoom = 0.015;
            mapFrame.src =
                `https://www.openstreetmap.org/export/embed.html?bbox=${lon - zoom},${lat - zoom},${lon + zoom},${lat + zoom}&layer=mapnik&marker=${lat},${lon}`;

            // плавное появление с задержкой на рендеринг
            mapFrame.style.opacity = '0';
            requestAnimationFrame(() => {
                setTimeout(() => {
                    mapFrame.style.transition = 'opacity 0.6s ease';
                    mapFrame.style.opacity = '1';
                }, 50);
            });
        }

        // ============================================================
        // 7. КООРДИНАТЫ И ССЫЛКА
        // ============================================================
        function updateCoords(lat, lon) {
            coordsDisplay.textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        }

        function generateLink(lat, lon) {
            const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
            trackLink.textContent = url;
            linkBox.className = 'link-box show';
            copyBtn.style.display = 'flex';
            googleBtn.style.display = 'flex';
            return url;
        }

        // ============================================================
        // 8. КОПИРОВАНИЕ И GOOGLE MAPS
        // ============================================================
        function copyLink() {
            const text = trackLink.textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ Ссылка скопирована!', 'success');
                }).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('✅ Ссылка скопирована!', 'success');
            } catch (e) {
                showToast('❌ Не удалось скопировать', 'error');
            }
            document.body.removeChild(ta);
        }

        function openGoogleMaps() {
            if (lastCoords) {
                window.open(`https://www.google.com/maps?q=${lastCoords.lat},${lastCoords.lon}`, '_blank');
            } else {
                showToast('Нет координат', 'error');
            }
        }

        // ============================================================
        // 9. УВЕДОМЛЕНИЕ О ПЕРЕМЕЩЕНИИ (оптимизированное)
        // ============================================================
        function notifyIfMoved(lat, lon) {
            if (!lastNotifyCoords) {
                lastNotifyCoords = { lat, lon };
                return;
            }
            const dist = Math.hypot(lat - lastNotifyCoords.lat, lon - lastNotifyCoords.lon);
            if (dist > 0.0003) {
                showToast('🌀 Вихрь переместился!', 'info');
                if (navigator.vibrate) navigator.vibrate(20);
                lastNotifyCoords = { lat, lon };
            }
        }

        // ============================================================
        // 10. СТАРТ / СТОП (оптимизированные)
        // ============================================================
        function startTracking() {
            if (!navigator.geolocation) {
                showToast('❌ Браузер не поддерживает геолокацию', 'error');
                return;
            }

            if (isTracking) {
                showToast('🌀 Вихрь уже активен', 'info');
                return;
            }

            showToast('🌪️ Запуск вихря...', 'info');
            updateStatus('Запуск...', 'info');

            startBtn.disabled = true;
            startBtn.textContent = '🌪️ ...';

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    lastCoords = { lat, lon };

                    if (!isTracking) {
                        isTracking = true;
                        startBtn.style.display = 'none';
                        stopBtn.style.display = 'flex';
                    }

                    showMap(lat, lon);
                    updateCoords(lat, lon);
                    generateLink(lat, lon);
                    updateStatus('Вихрь активен', 'active');
                    notifyIfMoved(lat, lon);

                    const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
                    window.history.replaceState({}, '', url);
                },
                (err) => {
                    let msg = 'Ошибка GPS';
                    if (err.code === 1) msg = '❌ Доступ запрещён! Разреши в браузере.';
                    else if (err.code === 2) msg = '❌ Сигнал GPS не найден';
                    else if (err.code === 3) msg = '❌ Таймаут';
                    showToast(msg, 'error');
                    updateStatus('Ошибка', 'error');
                    isTracking = false;
                    startBtn.disabled = false;
                    startBtn.textContent = '🌪️ Начать';
                    startBtn.style.display = 'flex';
                    stopBtn.style.display = 'none';
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 3000,
                    timeout: 15000
                }
            );
        }

        function stopTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isTracking = false;
            lastNotifyCoords = null;
            startBtn.style.display = 'flex';
            startBtn.disabled = false;
            startBtn.textContent = '🌪️ Начать';
            stopBtn.style.display = 'none';
            updateStatus('Вихрь остановлен', 'inactive');
            showToast('⏹ Вихрь остановлен', 'info');
        }

        // ============================================================
        // 11. ЗАГРУЗКА ИЗ URL
        // ============================================================
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const lat = parseFloat(params.get('lat'));
            const lon = parseFloat(params.get('lon'));

            if (!isNaN(lat) && !isNaN(lon)) {
                lastCoords = { lat, lon };
                showMap(lat, lon);
                updateCoords(lat, lon);
                generateLink(lat, lon);
                updateStatus('Вихрь активен', 'active');
                showToast('🌀 Вихрь загружен', 'success');
            } else {
                updateStatus('Ожидание', 'inactive');
            }
        }, { passive: true });
    </script>
</body>
</html>
