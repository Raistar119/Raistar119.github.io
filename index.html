<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 Локация</title>
    <style>
        /* ============================================================
           ПЕРЕМЕННЫЕ
           ============================================================ */
        :root {
            --bg: #f0f2f8;
            --glass: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --text: #0b0e1a;
            --text-secondary: #4a5272;
            --text-muted: #8a94b0;
            --primary: #6c5ce7;
            --primary-glow: rgba(108, 92, 231, 0.35);
            --primary-light: #a29bfe;
            --success: #00b894;
            --success-glow: rgba(0, 184, 148, 0.35);
            --danger: #ff6b6b;
            --card-bg: rgba(255, 255, 255, 0.65);
            --map-bg: #d5dbe8;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            --radius: 24px;
            --radius-sm: 14px;
        }

        [data-theme="dark"] {
            --bg: #0b0e1a;
            --glass: rgba(20, 25, 50, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --text: #e8edf5;
            --text-secondary: #8a94b0;
            --text-muted: #5a6480;
            --card-bg: rgba(20, 25, 50, 0.6);
            --map-bg: #141a2e;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --primary: #a29bfe;
            --primary-glow: rgba(162, 155, 254, 0.3);
            --success: #55efc4;
            --success-glow: rgba(85, 239, 196, 0.3);
            --danger: #ff7675;
        }

        /* ============================================================
           БАЗА
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.4s ease, color 0.4s ease;
            backdrop-filter: blur(2px);
        }

        /* ============================================================
           ВЕРХНЯЯ ПАНЕЛЬ — стеклянная
           ============================================================ */
        .header {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 24px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 20;
            transition: background 0.4s ease, border 0.4s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text);
        }

        .header h1 span {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            background: var(--primary);
            color: #fff;
            padding: 5px 14px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            transition: background 0.3s, color 0.3s;
            box-shadow: 0 2px 12px var(--primary-glow);
        }

        .badge.inactive {
            background: var(--text-muted);
            box-shadow: none;
            color: #fff;
        }

        .badge.error {
            background: var(--danger);
            box-shadow: 0 2px 12px rgba(255, 107, 107, 0.3);
        }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(10px);
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--text);
        }

        .theme-toggle:active {
            transform: scale(0.92);
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ============================================================
           КАРТА — с эффектом стекла
           ============================================================ */
        .map-wrapper {
            flex: 1;
            min-height: 48vh;
            margin: 16px 20px 0;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            background: var(--map-bg);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: background 0.4s ease;
            border: 1px solid var(--glass-border);
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .map-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 15px;
            padding: 30px;
            text-align: center;
        }

        .map-placeholder .icon {
            font-size: 52px;
            margin-bottom: 14px;
            opacity: 0.4;
        }

        .map-placeholder .title {
            font-weight: 600;
            font-size: 17px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        /* ============================================================
           ИНФО-ПАНЕЛЬ — стеклянная карточка
           ============================================================ */
        .info-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px) saturate(1.3);
            -webkit-backdrop-filter: blur(16px) saturate(1.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            margin: 14px 20px 0;
            padding: 16px 20px 14px;
            flex-shrink: 0;
            box-shadow: var(--shadow);
            transition: background 0.4s ease, border 0.4s ease;
        }

        .coords-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

        .coords-row .coords {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
            font-family: 'SF Mono', 'Menlo', monospace;
            letter-spacing: 0.2px;
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 8px;
            transition: background 0.4s ease;
        }

        .coords-row .time {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .status-line .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .dot.inactive {
            background: var(--text-muted);
        }
        .dot.active {
            background: var(--success);
            box-shadow: 0 0 20px var(--success-glow);
            animation: pulse 1.8s infinite;
        }
        .dot.error {
            background: var(--danger);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ============================================================
           ССЫЛКА
           ============================================================ */
        .link-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin: 10px 20px 0;
            display: none;
            flex-shrink: 0;
            transition: background 0.4s ease, border 0.4s ease;
        }

        .link-box.show {
            display: block;
        }

        .link-box .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .link-box .url {
            color: var(--primary);
            margin-top: 4px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            word-break: break-all;
            font-weight: 500;
        }

        /* ============================================================
           КНОПКИ — современный стиль
           ============================================================ */
        .actions {
            padding: 14px 20px 24px;
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            flex: 1;
            min-width: 56px;
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* ——— Primary ——— */
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .btn-primary:active {
            box-shadow: 0 2px 10px var(--primary-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        /* ——— Danger ——— */
        .btn-danger {
            background: rgba(255, 107, 107, 0.12);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.15);
        }

        .btn-danger:active {
            background: rgba(255, 107, 107, 0.2);
        }

        /* ——— Outline ——— */
        .btn-outline {
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            flex: 0.5;
        }

        .btn-outline:active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ——— Google ——— */
        .btn-google {
            background: #ea4335;
            color: #fff;
            flex: 0.6;
            box-shadow: 0 4px 16px rgba(234, 67, 53, 0.25);
        }

        .btn-google:active {
            background: #d33426;
            transform: scale(0.96);
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
            box-shadow: 0 12px 48px var(--success-glow);
        }

        .toast.error {
            border-color: var(--danger);
            box-shadow: 0 12px 48px rgba(255, 107, 107, 0.2);
        }

        .toast.info {
            border-color: var(--primary);
            box-shadow: 0 12px 48px var(--primary-glow);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 500px) {
            .header { padding: 12px 16px 10px; }
            .header h1 { font-size: 16px; }
            .header h1 span { display: none; }
            .header-icon { width: 32px; height: 32px; font-size: 15px; }
            .map-wrapper { margin: 10px 12px 0; min-height: 40vh; border-radius: 18px; }
            .info-panel { margin: 10px 12px 0; padding: 14px 16px; }
            .coords-row .coords { font-size: 14px; }
            .actions { padding: 10px 12px 16px; gap: 8px; }
            .btn { font-size: 13px; padding: 12px 14px; border-radius: 12px; }
            .btn-google { flex: 0.4; }
            .btn-outline { flex: 0.4; }
            .link-box { margin: 8px 12px 0; }
            .toast { bottom: 80px; padding: 12px 20px; font-size: 13px; }
        }

        @media (min-height: 750px) {
            .map-wrapper { min-height: 55vh; }
        }

        @media (max-width: 380px) {
            .btn { font-size: 11px; padding: 10px 8px; }
            .btn-google { flex: 0.3; }
            .btn-outline { flex: 0.3; }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    ВЕРХНЯЯ ПАНЕЛЬ
    ============================================================ -->
    <div class="header">
        <div class="header-left">
            <div class="header-icon">📍</div>
            <h1>Локация <span>• трекер</span></h1>
        </div>
        <div class="header-actions">
            <span class="badge inactive" id="statusBadge">Ожидание</span>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Сменить тему">
                🌙
            </button>
        </div>
    </div>

    <!-- ============================================================
    КАРТА
    ============================================================ -->
    <div class="map-wrapper" id="mapWrapper">
        <div class="map-placeholder" id="mapPlaceholder">
            <div class="icon">🗺️</div>
            <div class="title">Начните отслеживание</div>
            <div style="font-size:13px;opacity:0.5;margin-top:4px;">Нажмите «Начать» чтобы показать местоположение</div>
        </div>
        <iframe id="mapFrame" style="display:none;"></iframe>
    </div>

    <!-- ============================================================
    ИНФО-ПАНЕЛЬ
    ============================================================ -->
    <div class="info-panel">
        <div class="coords-row">
            <span class="coords" id="coordsDisplay">—</span>
            <span class="time" id="timeDisplay">—</span>
        </div>
        <div class="status-line">
            <span class="dot inactive" id="statusDot"></span>
            <span id="statusText">Ожидание запуска</span>
        </div>
    </div>

    <!-- ============================================================
    ССЫЛКА
    ============================================================ -->
    <div class="link-box" id="linkBox">
        <div class="label">🔗 Ссылка для передачи</div>
        <div class="url" id="trackLink"></div>
    </div>

    <!-- ============================================================
    КНОПКИ
    ============================================================ -->
    <div class="actions">
        <button class="btn btn-primary" id="startBtn" onclick="startTracking()">
            ▶ Начать
        </button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopTracking()" style="display:none;">
            ⏹ Стоп
        </button>
        <button class="btn btn-outline" id="copyBtn" onclick="copyLink()" style="display:none;" title="Скопировать ссылку">
            📋
        </button>
        <button class="btn btn-google" id="googleBtn" onclick="openGoogleMaps()" style="display:none;" title="Открыть в Google Maps">
            🗺️
        </button>
    </div>

    <!-- ============================================================
    TOAST
    ============================================================ -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        // 1. ТЁМНАЯ ТЕМА
        // ============================================================
        const themeToggle = document.getElementById('themeToggle');

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', next);
            updateBadgeTheme(next);
        }

        function updateBadgeTheme(theme) {
            const badge = document.getElementById('statusBadge');
            if (badge.classList.contains('inactive')) return;
            if (theme === 'dark') {
                badge.style.background = '#a29bfe';
                badge.style.color = '#0b0e1a';
            } else {
                badge.style.background = '#6c5ce7';
                badge.style.color = '#fff';
            }
        }

        // Загрузка темы
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        // ============================================================
        // 2. ОСНОВНАЯ ЛОГИКА
        // ============================================================

        let watchId = null;
        let isTracking = false;
        let lastCoords = null;
        let lastNotifyCoords = null;

        const mapPlaceholder = document.getElementById('mapPlaceholder');
        const mapFrame = document.getElementById('mapFrame');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const statusBadge = document.getElementById('statusBadge');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const copyBtn = document.getElementById('copyBtn');
        const googleBtn = document.getElementById('googleBtn');
        const linkBox = document.getElementById('linkBox');
        const trackLink = document.getElementById('trackLink');
        const toast = document.getElementById('toast');

        let toastTimer = null;

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        function updateStatus(text, state) {
            statusText.textContent = text;
            statusDot.className = 'dot ' + state;
            statusBadge.className = 'badge';

            if (state === 'active') {
                statusBadge.textContent = '● Активно';
                statusBadge.classList.add('active');
                statusBadge.style.background = 'var(--success)';
                statusBadge.style.color = '#fff';
                statusBadge.style.boxShadow = '0 2px 20px var(--success-glow)';
            } else if (state === 'error') {
                statusBadge.textContent = '⚠ Ошибка';
                statusBadge.classList.add('error');
            } else {
                statusBadge.textContent = '○ Ожидание';
                statusBadge.classList.add('inactive');
                statusBadge.style.background = '';
                statusBadge.style.boxShadow = '';
            }
        }

        function showMap(lat, lon) {
            mapPlaceholder.style.display = 'none';
            mapFrame.style.display = 'block';
            mapFrame.src =
                `https://www.openstreetmap.org/export/embed.html?bbox=${lon - 0.025},${lat - 0.025},${lon + 0.025},${lat + 0.025}&layer=mapnik&marker=${lat},${lon}`;
        }

        function updateCoords(lat, lon) {
            coordsDisplay.textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            timeDisplay.textContent = new Date().toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function generateLink(lat, lon) {
            const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
            trackLink.textContent = url;
            linkBox.className = 'link-box show';
            copyBtn.style.display = 'flex';
            googleBtn.style.display = 'flex';
            return url;
        }

        function copyLink() {
            const text = trackLink.textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ Ссылка скопирована!', 'success');
                });
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ Ссылка скопирована!', 'success');
            }
        }

        function openGoogleMaps() {
            if (lastCoords) {
                const url = `https://www.google.com/maps?q=${lastCoords.lat},${lastCoords.lon}`;
                window.open(url, '_blank');
            } else {
                showToast('Нет координат', 'error');
            }
        }

        function notifyIfMoved(lat, lon) {
            if (!lastNotifyCoords) {
                lastNotifyCoords = { lat, lon };
                return;
            }
            const dist = Math.sqrt(
                Math.pow(lat - lastNotifyCoords.lat, 2) +
                Math.pow(lon - lastNotifyCoords.lon, 2)
            );
            if (dist > 0.0003) {
                showToast('📍 Местоположение изменилось!', 'info');
                if (navigator.vibrate) navigator.vibrate(30);
                lastNotifyCoords = { lat, lon };
            }
        }

        // ============================================================
        // 3. СТАРТ / СТОП
        // ============================================================

        function startTracking() {
            if (!navigator.geolocation) {
                showToast('❌ Браузер не поддерживает геолокацию', 'error');
                return;
            }

            if (isTracking) {
                showToast('⏳ Уже отслеживается', 'info');
                return;
            }

            showToast('⏳ Запрос доступа...', 'info');
            updateStatus('Запрос разрешения...', 'info');

            startBtn.disabled = true;
            startBtn.textContent = '⏳ ...';

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    lastCoords = { lat, lon };

                    if (!isTracking) {
                        isTracking = true;
                        startBtn.style.display = 'none';
                        stopBtn.style.display = 'flex';
                    }

                    showMap(lat, lon);
                    updateCoords(lat, lon);
                    generateLink(lat, lon);
                    updateStatus('Активно', 'active');
                    notifyIfMoved(lat, lon);

                    const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
                    window.history.replaceState({}, '', url);
                },
                (err) => {
                    let msg = 'Ошибка GPS';
                    if (err.code === 1) msg = '❌ Доступ запрещён! Разреши в браузере.';
                    else if (err.code === 2) msg = '❌ Сигнал GPS не найден';
                    else if (err.code === 3) msg = '❌ Таймаут';
                    showToast(msg, 'error');
                    updateStatus('Ошибка', 'error');
                    isTracking = false;
                    startBtn.disabled = false;
                    startBtn.textContent = '▶ Начать';
                    startBtn.style.display = 'flex';
                    stopBtn.style.display = 'none';
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 3000,
                    timeout: 15000
                }
            );
        }

        function stopTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isTracking = false;
            lastNotifyCoords = null;
            startBtn.style.display = 'flex';
            startBtn.disabled = false;
            startBtn.textContent = '▶ Начать';
            stopBtn.style.display = 'none';
            updateStatus('Остановлено', 'inactive');
            showToast('⏹ Отслеживание остановлено', 'info');
        }

        // ============================================================
        // 4. ЗАГРУЗКА ИЗ URL
        // ============================================================

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const lat = parseFloat(params.get('lat'));
            const lon = parseFloat(params.get('lon'));

            if (!isNaN(lat) && !isNaN(lon)) {
                lastCoords = { lat, lon };
                showMap(lat, lon);
                updateCoords(lat, lon);
                generateLink(lat, lon);
                updateStatus('Просмотр', 'active');
                showToast('📍 Местоположение загружено', 'success');
            } else {
                updateStatus('Ожидание', 'inactive');
            }
        };
    </script>
</body>
</html>
