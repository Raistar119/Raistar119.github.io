<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Трекер</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        button {
            background: #6C63FF;
            border: none;
            color: #fff;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        button:hover { background: #5a52d5; }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        .status.ok { display: block; background: #1a3a1a; color: #4ade80; }
        .status.err { display: block; background: #3a1a1a; color: #f87171; }
        .link-box {
            margin-top: 20px;
            background: #0a0a0a;
            padding: 10px;
            border-radius: 10px;
            word-break: break-all;
            font-size: 12px;
            opacity: 0.7;
            display: none;
        }
        .link-box.show { display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 Поделиться местом</h2>
    <p style="opacity:0.5;">Нажми кнопку, чтобы отправить геопозицию</p>
    <button onclick="sendLocation()">📍 Отправить</button>
    <div class="status" id="status"></div>
    <div class="link-box" id="linkBox">
        📋 Ссылка для просмотра:<br>
        <span id="trackLink"></span>
    </div>
</div>

<script>
    function sendLocation() {
        const status = document.getElementById('status');
        const linkBox = document.getElementById('linkBox');
        const trackLink = document.getElementById('trackLink');

        if (!navigator.geolocation) {
            status.className = 'status err';
            status.textContent = '❌ Браузер не поддерживает GPS';
            return;
        }

        status.className = 'status';
        status.textContent = '⏳ Получаю координаты...';

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const time = new Date().toLocaleString();

                // Создаём ссылку с координатами
                const url = window.location.href.split('?')[0] + `?lat=${lat}&lon=${lon}&time=${encodeURIComponent(time)}`;
                
                // Показываем ссылку
                trackLink.textContent = url;
                linkBox.className = 'link-box show';

                status.className = 'status ok';
                status.textContent = '✅ Координаты получены! Скопируй ссылку и отправь ему ❤️';
            },
            (err) => {
                let msg = '❌ Ошибка';
                if (err.code === 1) msg = '❌ Ты запретила доступ к геолокации! Разреши в браузере.';
                if (err.code === 2) msg = '❌ GPS не доступен';
                if (err.code === 3) msg = '❌ Таймаут';
                status.className = 'status err';
                status.textContent = msg;
            },
            { enableHighAccuracy: true }
        );
    }

    // Если в URL уже есть координаты — показываем карту
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat');
    const lon = params.get('lon');
    const time = params.get('time');

    if (lat && lon) {
        document.querySelector('.card').innerHTML = `
            <h2>📍 Она здесь!</h2>
            <div style="margin:20px 0;border-radius:16px;overflow:hidden;height:300px;background:#0a0a0a;">
                <iframe 
                    src="https://www.openstreetmap.org/export/embed.html?bbox=${parseFloat(lon) - 0.015},${parseFloat(lat) - 0.015},${parseFloat(lon) + 0.015},${parseFloat(lat) + 0.015}&layer=mapnik&marker=${lat},${lon}"
                    style="width:100%;height:100%;border:none;">
                </iframe>
            </div>
            <div style="opacity:0.6;font-size:14px;">
                📍 ${lat}, ${lon}<br>
                🕒 ${time || 'только что'}
            </div>
            <button onclick="window.location.reload()" style="margin-top:15px;padding:10px 30px;background:#6C63FF;border:none;border-radius:60px;color:#fff;font-size:14px;cursor:pointer;">
                🔄 Обновить
            </button>
            <p style="opacity:0.3;font-size:12px;margin-top:15px;">
                Обновляется при каждом открытии ссылки
            </p>
        `;
    }
</script>

</body>
</html>
