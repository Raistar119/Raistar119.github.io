<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 Местоположение</title>
    <style>
        /* ===== ОБНУЛЕНИЕ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .header {
            background: #ffffff;
            padding: 16px 20px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a1a2e;
        }

        .header .badge {
            font-size: 11px;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* ===== КАРТА (большая) ===== */
        .map-wrapper {
            flex: 1;
            min-height: 55vh;
            background: #e8edf4;
            position: relative;
            overflow: hidden;
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .map-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8895aa;
            font-size: 15px;
            padding: 30px;
            text-align: center;
        }

        .map-placeholder .icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* ===== ИНФО-БЛОК ===== */
        .info-panel {
            background: #ffffff;
            padding: 16px 20px 8px;
            flex-shrink: 0;
            border-top: 1px solid #f0f2f5;
        }

        .coords-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #3d4a5c;
        }

        .coords-row .coords {
            font-weight: 500;
            color: #1a1a2e;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        .coords-row .time {
            color: #8895aa;
            font-size: 12px;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 13px;
            color: #3d4a5c;
        }

        .status-line .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .dot.inactive {
            background: #cbd5e1;
        }
        .dot.active {
            background: #22c55e;
            animation: pulse 1.8s infinite;
        }
        .dot.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ===== КНОПКИ ===== */
        .actions {
            background: #ffffff;
            padding: 12px 20px 20px;
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            border-top: 1px solid #f0f2f5;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            background: #f1f4f9;
            color: #1a1a2e;
        }

        .btn-primary {
            background: #1a73e8;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.25);
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: #1557b0;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
        }

        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-danger:active {
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #e2e8f0;
            flex: 0.5;
        }

        .btn-outline:active {
            background: #f1f4f9;
        }

        .btn-success {
            background: #22c55e;
            color: #fff;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.25);
        }

        /* ===== СООБЩЕНИЯ ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #dc2626;
        }
        .toast.success {
            background: #16a34a;
        }
        .toast.info {
            background: #1a73e8;
        }

        /* ===== ССЫЛКА ===== */
        .link-box {
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 12px;
            margin: 6px 20px 0;
            font-size: 12px;
            color: #3d4a5c;
            word-break: break-all;
            display: none;
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .link-box.show {
            display: block;
        }

        .link-box .label {
            font-weight: 500;
            font-size: 11px;
            color: #8895aa;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .link-box .url {
            color: #1a73e8;
            margin-top: 4px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 500px) {
            .header h1 { font-size: 16px; }
            .coords-row { font-size: 12px; flex-wrap: wrap; gap: 4px; }
            .coords-row .coords { font-size: 13px; }
            .btn { font-size: 14px; padding: 14px 12px; }
        }

        @media (min-height: 700px) {
            .map-wrapper {
                min-height: 65vh;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
    <div class="header">
        <h1>📍 Локация</h1>
        <span class="badge" id="statusBadge">Ожидание</span>
    </div>

    <!-- ===== КАРТА ===== -->
    <div class="map-wrapper" id="mapWrapper">
        <div class="map-placeholder" id="mapPlaceholder">
            <div class="icon">🗺️</div>
            <div>Нажми «Начать» чтобы показать местоположение</div>
            <div style="font-size:13px;margin-top:6px;opacity:0.5;">Геолокация будет видна только тебе</div>
        </div>
        <iframe id="mapFrame" style="display:none;"></iframe>
    </div>

    <!-- ===== ИНФО-ПАНЕЛЬ ===== -->
    <div class="info-panel">
        <div class="coords-row">
            <span class="coords" id="coordsDisplay">—</span>
            <span class="time" id="timeDisplay">—</span>
        </div>
        <div class="status-line">
            <span class="dot inactive" id="statusDot"></span>
            <span id="statusText">Ожидание запуска</span>
        </div>
    </div>

    <!-- ===== ССЫЛКА ===== -->
    <div class="link-box" id="linkBox">
        <div class="label">🔗 Ссылка для передачи</div>
        <div class="url" id="trackLink"></div>
    </div>

    <!-- ===== КНОПКИ ===== -->
    <div class="actions">
        <button class="btn btn-primary" id="startBtn" onclick="startTracking()">
            ▶ Начать
        </button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopTracking()" style="display:none;">
            ⏹ Остановить
        </button>
        <button class="btn btn-outline" id="copyBtn" onclick="copyLink()" style="display:none;">
            📋
        </button>
    </div>

    <!-- ===== TOAST (всплывашка) ===== -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // ОСНОВНАЯ ЛОГИКА
        // ============================================

        let watchId = null;
        let isTracking = false;
        let lastCoords = null;

        const mapWrapper = document.getElementById('mapWrapper');
        const mapPlaceholder = document.getElementById('mapPlaceholder');
        const mapFrame = document.getElementById('mapFrame');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const statusBadge = document.getElementById('statusBadge');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const copyBtn = document.getElementById('copyBtn');
        const linkBox = document.getElementById('linkBox');
        const trackLink = document.getElementById('trackLink');
        const toast = document.getElementById('toast');

        let toastTimer = null;

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        function updateStatus(text, state) {
            statusText.textContent = text;
            statusDot.className = 'dot ' + state;
            if (state === 'active') {
                statusBadge.textContent = '● Активно';
                statusBadge.style.background = '#dcfce7';
                statusBadge.style.color = '#16a34a';
            } else if (state === 'error') {
                statusBadge.textContent = '⚠ Ошибка';
                statusBadge.style.background = '#fee2e2';
                statusBadge.style.color = '#dc2626';
            } else {
                statusBadge.textContent = '○ Ожидание';
                statusBadge.style.background = '#f1f4f9';
                statusBadge.style.color = '#3d4a5c';
            }
        }

        function showMap(lat, lon) {
            mapPlaceholder.style.display = 'none';
            mapFrame.style.display = 'block';
            mapFrame.src = `https://www.openstreetmap.org/export/embed.html?bbox=${lon - 0.02},${lat - 0.02},${lon + 0.02},${lat + 0.02}&layer=mapnik&marker=${lat},${lon}`;
        }

        function updateCoords(lat, lon) {
            coordsDisplay.textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            timeDisplay.textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function generateLink(lat, lon) {
            const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
            trackLink.textContent = url;
            linkBox.className = 'link-box show';
            copyBtn.style.display = 'flex';
            return url;
        }

        function copyLink() {
            const text = trackLink.textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ Ссылка скопирована!', 'success');
                });
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ Ссылка скопирована!', 'success');
            }
        }

        // ============================================
        // СТАРТ / СТОП
        // ============================================

        function startTracking() {
            if (!navigator.geolocation) {
                showToast('❌ Браузер не поддерживает геолокацию', 'error');
                return;
            }

            if (isTracking) {
                showToast('⏳ Уже отслеживается', 'info');
                return;
            }

            showToast('⏳ Запрос доступа...', 'info');
            updateStatus('Запрос разрешения...', 'info');

            startBtn.disabled = true;
            startBtn.textContent = '⏳ ...';

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    lastCoords = { lat, lon };

                    if (!isTracking) {
                        isTracking = true;
                        startBtn.style.display = 'none';
                        stopBtn.style.display = 'flex';
                    }

                    showMap(lat, lon);
                    updateCoords(lat, lon);
                    generateLink(lat, lon);
                    updateStatus('Активно', 'active');
                    showToast('📍 Местоположение обновлено', 'success');

                    // обновляем URL (без перезагрузки)
                    const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
                    window.history.replaceState({}, '', url);
                },
                (err) => {
                    let msg = 'Ошибка GPS';
                    if (err.code === 1) msg = '❌ Доступ запрещён! Разреши в браузере.';
                    else if (err.code === 2) msg = '❌ Сигнал GPS не найден';
                    else if (err.code === 3) msg = '❌ Таймаут';
                    showToast(msg, 'error');
                    updateStatus('Ошибка', 'error');
                    isTracking = false;
                    startBtn.disabled = false;
                    startBtn.textContent = '▶ Начать';
                    startBtn.style.display = 'flex';
                    stopBtn.style.display = 'none';
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                },
                { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
            );
        }

        function stopTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isTracking = false;
            startBtn.style.display = 'flex';
            startBtn.disabled = false;
            startBtn.textContent = '▶ Начать';
            stopBtn.style.display = 'none';
            updateStatus('Остановлено', 'inactive');
            showToast('⏹ Отслеживание остановлено', 'info');
        }

        // ============================================
        // ЗАГРУЗКА КООРДИНАТ ИЗ URL
        // ============================================

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const lat = parseFloat(params.get('lat'));
            const lon = parseFloat(params.get('lon'));

            if (!isNaN(lat) && !isNaN(lon)) {
                showMap(lat, lon);
                updateCoords(lat, lon);
                generateLink(lat, lon);
                updateStatus('Просмотр', 'active');
                showToast('📍 Местоположение загружено', 'success');
            } else {
                updateStatus('Ожидание', 'inactive');
            }
        };
    </script>
</body>
</html>
