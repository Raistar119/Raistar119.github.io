<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌪️ VORTEX</title>
    <style>
        /* ============================================================
           ПЕРЕМЕННЫЕ
           ============================================================ */
        :root {
            --bg: #f0f2f8;
            --card: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.25);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            --text: #0f1419;
            --text-secondary: #536471;
            --text-muted: #8899a6;
            --primary: #6c5ce7;
            --primary-glow: rgba(108, 92, 231, 0.3);
            --primary-light: #a29bfe;
            --success: #00b894;
            --success-glow: rgba(0, 184, 148, 0.3);
            --danger: #ff6b6b;
            --radius: 28px;
            --radius-sm: 16px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        [data-theme="dark"] {
            --bg: #0a0e1a;
            --card: rgba(16, 22, 40, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            --text: #e8edf5;
            --text-secondary: #8899b0;
            --text-muted: #5a6480;
            --primary: #a29bfe;
            --primary-glow: rgba(162, 155, 254, 0.25);
        }

        /* ============================================================
           БАЗА
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        /* ============================================================
           ВОДОВОРОТ (ФОН)
           ============================================================ */
        .vortex-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            will-change: transform;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(108, 92, 231, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 184, 148, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(162, 155, 254, 0.04) 0%, transparent 60%);
            animation: vortexBg 20s linear infinite;
        }

        @keyframes vortexBg {
            0% {
                transform: rotate(0deg) scale(1);
            }
            100% {
                transform: rotate(360deg) scale(1.1);
            }
        }

        /* ============================================================
           ШАПКА
           ============================================================ */
        .header {
            position: relative;
            z-index: 10;
            padding: 16px 20px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--card);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--card-border);
            transition: background var(--transition), border var(--transition);
            will-change: background, border;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .vortex-logo {
            width: 44px;
            height: 44px;
            position: relative;
            flex-shrink: 0;
            will-change: transform;
        }

        .vortex-logo svg {
            width: 100%;
            height: 100%;
            animation: spinVortex 4s linear infinite;
            filter: drop-shadow(0 0 20px var(--primary-glow));
            will-change: transform;
        }

        @keyframes spinVortex {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .vortex-logo .ring {
            stroke: var(--primary);
            stroke-width: 2;
            fill: none;
            opacity: 0.6;
        }

        .vortex-logo .ring-inner {
            stroke: var(--primary-light);
            stroke-width: 1.5;
            fill: none;
            opacity: 0.3;
            animation: spinReverse 3s linear infinite;
            will-change: transform;
        }

        @keyframes spinReverse {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(-360deg);
            }
        }

        .vortex-logo .dot {
            fill: var(--primary);
            animation: pulseDot 1.5s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.6);
            }
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #6c5ce7);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            text-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(108, 92, 231, 0.15);
            position: relative;
            will-change: background-position;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .brand-tag {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            -webkit-text-fill-color: var(--text-muted);
            margin-left: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: var(--card);
            backdrop-filter: blur(10px);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text);
            will-change: transform, background;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .header-btn:active {
            transform: scale(0.92);
        }

        /* ============================================================
           КАРТА
           ============================================================ */
        .map-wrapper {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 48vh;
            margin: 12px 16px 0;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg);
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            transition: background var(--transition), border var(--transition);
            transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.6s ease;
            will-change: opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .map-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 20%, transparent 60%, var(--bg) 100%),
                radial-gradient(ellipse at 70% 80%, transparent 60%, var(--bg) 100%);
            opacity: 0.2;
            transition: opacity var(--transition);
            border-radius: var(--radius);
            will-change: opacity;
        }

        .map-wrapper::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            z-index: 1;
            pointer-events: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), transparent 50%, var(--primary-light));
            opacity: 0.04;
            transition: opacity var(--transition);
            will-change: opacity;
        }

        .map-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            padding: 30px;
            text-align: center;
        }

        .map-placeholder .icon {
            font-size: 56px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .map-placeholder .title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* ============================================================
           ПЛАВАЮЩАЯ ПАНЕЛЬ
           ============================================================ */
        .floating-panel {
            position: relative;
            z-index: 5;
            margin: -20px 16px 0;
            padding: 16px 20px;
            background: var(--card);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border-radius: var(--radius);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
            transition: background var(--transition), border var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            will-change: background, border;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-info .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            will-change: transform, box-shadow;
        }

        .dot.inactive {
            background: var(--text-muted);
        }
        .dot.active {
            background: var(--success);
            box-shadow: 0 0 20px var(--success-glow);
            animation: pulseDot 2s infinite;
        }
        .dot.error {
            background: var(--danger);
        }

        .status-info .label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .coords-display {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 30px;
            transition: background var(--transition);
            will-change: background;
        }

        /* ============================================================
           АВТОРИЗАЦИЯ (ЭКРАН ВХОДА)
           ============================================================ */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        .auth-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .auth-card {
            background: var(--card);
            backdrop-filter: blur(30px) saturate(1.5);
            -webkit-backdrop-filter: blur(30px) saturate(1.5);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 40px 32px 32px;
            max-width: 380px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
        }

        /* ===== Логотип с водоворотом на экране входа ===== */
        .auth-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 12px;
            position: relative;
            display: block;
        }

        .auth-logo svg {
            width: 100%;
            height: 100%;
            animation: spinVortex 4s linear infinite;
            filter: drop-shadow(0 0 30px var(--primary-glow));
            will-change: transform;
        }

        .auth-logo .ring {
            stroke: var(--primary);
            stroke-width: 2.5;
            fill: none;
            opacity: 0.6;
        }

        .auth-logo .ring-inner {
            stroke: var(--primary-light);
            stroke-width: 2;
            fill: none;
            opacity: 0.3;
            animation: spinReverse 3s linear infinite;
            will-change: transform;
        }

        .auth-logo .dot {
            fill: var(--primary);
            animation: pulseDot 1.5s ease-in-out infinite;
            will-change: transform, opacity;
        }

        .auth-card h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .auth-card .sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            -webkit-text-fill-color: var(--text-muted);
        }

        .auth-card .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .auth-card .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .auth-card .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--card-border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            transition: border 0.2s ease;
            outline: none;
        }

        .auth-card .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .auth-card .btn-auth {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--primary);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            margin-top: 8px;
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .auth-card .btn-auth:active {
            transform: scale(0.97);
        }

        .auth-card .btn-auth:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .auth-card .toggle-mode {
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-card .toggle-mode button {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            -webkit-text-fill-color: var(--primary);
        }

        .auth-card .toggle-mode button:active {
            transform: scale(0.95);
        }

        .auth-card .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 10px;
            min-height: 20px;
        }

        /* ============================================================
           ССЫЛКА
           ============================================================ */
        .link-box {
            position: relative;
            z-index: 5;
            margin: 10px 16px 0;
            padding: 12px 16px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            display: none;
            transition: background var(--transition), border var(--transition);
            will-change: background, border;
        }

        .link-box.show {
            display: block;
        }

        .link-box .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .link-box .url {
            color: var(--primary);
            margin-top: 4px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            word-break: break-all;
        }

        /* ============================================================
           КНОПКИ
           ============================================================ */
        .actions {
            position: relative;
            z-index: 5;
            padding: 12px 16px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            will-change: transform;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            flex: 1;
            min-width: 56px;
            letter-spacing: 0.2px;
            will-change: transform, box-shadow;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 24px var(--primary-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: rgba(255, 107, 107, 0.12);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.15);
        }

        .btn-outline {
            background: var(--card);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            flex: 0.5;
        }

        .btn-google {
            background: #ea4335;
            color: #fff;
            flex: 0.5;
            box-shadow: 0 4px 20px rgba(234, 67, 53, 0.2);
        }

        .btn-logout {
            background: rgba(255, 107, 107, 0.08);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.1);
            flex: 0.4;
            font-size: 13px;
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform, opacity;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
        }
        .toast.error {
            border-color: var(--danger);
        }
        .toast.info {
            border-color: var(--primary);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 500px) {
            .header {
                padding: 12px 16px 10px;
            }
            .brand-name {
                font-size: 20px;
                letter-spacing: 1px;
            }
            .brand-tag {
                font-size: 9px;
                letter-spacing: 2px;
            }
            .vortex-logo {
                width: 36px;
                height: 36px;
            }
            .map-wrapper {
                margin: 8px 12px 0;
                min-height: 40vh;
                border-radius: 20px;
            }
            .floating-panel {
                margin: -14px 12px 0;
                padding: 12px 16px;
                border-radius: 20px;
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .status-info .label {
                font-size: 13px;
            }
            .coords-display {
                font-size: 12px;
                padding: 3px 10px;
            }
            .actions {
                padding: 8px 12px 16px;
                gap: 8px;
            }
            .btn {
                font-size: 13px;
                padding: 12px 16px;
                border-radius: 40px;
            }
            .link-box {
                margin: 8px 12px 0;
                padding: 10px 14px;
            }
            .toast {
                bottom: 80px;
                padding: 12px 20px;
                font-size: 13px;
                border-radius: 40px;
            }
            .auth-card {
                padding: 32px 20px 24px;
            }
            .auth-card h2 {
                font-size: 24px;
            }
            .auth-logo {
                width: 60px;
                height: 60px;
            }
            .btn-logout {
                flex: 0.3;
                font-size: 11px;
                padding: 12px 12px;
            }
        }

        @media (min-height: 750px) {
            .map-wrapper {
                min-height: 55vh;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    ФОН
    ============================================================ -->
    <div class="vortex-bg"></div>

    <!-- ============================================================
    ЭКРАН АВТОРИЗАЦИИ
    ============================================================ -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <!-- ===== ВОДОВОРОТ НАД VORTEX ===== -->
            <div class="auth-logo">
                <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
                    <!-- Внешние кольца -->
                    <circle class="ring" cx="36" cy="36" r="30"/>
                    <circle class="ring" cx="36" cy="36" r="24" stroke-dasharray="30 40"/>
                    <circle class="ring" cx="36" cy="36" r="18" stroke-dasharray="18 50"/>
                    <!-- Внутренние вращающиеся кольца -->
                    <circle class="ring-inner" cx="36" cy="36" r="12"/>
                    <circle class="ring-inner" cx="36" cy="36" r="6"/>
                    <!-- Пульсирующий центр -->
                    <circle class="dot" cx="36" cy="36" r="4"/>
                    <!-- Точки-спутники -->
                    <circle class="dot" cx="36" cy="10" r="2" style="animation-delay: 0.2s;"/>
                    <circle class="dot" cx="36" cy="62" r="2" style="animation-delay: 0.6s;"/>
                    <circle class="dot" cx="10" cy="36" r="2" style="animation-delay: 0.4s;"/>
                    <circle class="dot" cx="62" cy="36" r="2" style="animation-delay: 0.8s;"/>
                </svg>
            </div>

            <h2>VORTEX</h2>
            <div class="sub" id="authSub">Войдите, чтобы продолжить</div>

            <div class="input-group">
                <label for="authLogin">Логин</label>
                <input type="text" id="authLogin" placeholder="Введите логин" autocomplete="username">
            </div>

            <div class="input-group">
                <label for="authPassword">Пароль</label>
                <input type="password" id="authPassword" placeholder="Введите пароль" autocomplete="current-password">
            </div>

            <button class="btn-auth" id="authBtn" onclick="handleAuth()">Войти</button>

            <div class="toggle-mode">
                <span id="toggleText">Нет аккаунта?</span>
                <button id="toggleBtn" onclick="toggleAuthMode()">Зарегистрироваться</button>
            </div>

            <div class="error-msg" id="authError"></div>
        </div>
    </div>

    <!-- ============================================================
