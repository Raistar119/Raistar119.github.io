<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 Blink 2.0</title>
    <style>
        /* ============================================================
           ПЕРЕМЕННЫЕ
           ============================================================ */
        :root {
            --bg: #f2f4f8;
            --card: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            --text: #0f1419;
            --text-secondary: #536471;
            --text-muted: #8899a6;
            --primary: #1da1f2;
            --primary-glow: rgba(29, 161, 242, 0.25);
            --success: #00ba7c;
            --success-glow: rgba(0, 186, 124, 0.3);
            --danger: #f4245e;
            --radius: 28px;
            --radius-sm: 16px;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        [data-theme="dark"] {
            --bg: #0a0e14;
            --card: rgba(20, 28, 40, 0.8);
            --card-border: rgba(255, 255, 255, 0.06);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            --text: #e7ecf3;
            --text-secondary: #8899a6;
            --text-muted: #536471;
            --primary: #1da1f2;
            --primary-glow: rgba(29, 161, 242, 0.2);
        }

        /* ============================================================
           БАЗА
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
            position: relative;
        }

        /* ============================================================
           ФОН С ГРАДИЕНТОМ (как в Blink)
           ============================================================ */
        .bg-gradient {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(29, 161, 242, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 186, 124, 0.06) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* ============================================================
           ВЕРХНЯЯ ПАНЕЛЬ — как в Blink
           ============================================================ */
        .header {
            position: relative;
            z-index: 10;
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--card);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--card-border);
            transition: background var(--transition), border var(--transition);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1da1f2, #0d8bd9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 2px 12px var(--primary-glow);
            position: relative;
        }

        .avatar .online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--card);
            box-shadow: 0 0 16px var(--success-glow);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(0.8);
                opacity: 0.6;
            }
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text);
        }

        .header h1 span {
            font-weight: 400;
            font-size: 14px;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            backdrop-filter: blur(10px);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--text);
            border: 1px solid var(--card-border);
        }

        .header-btn:active {
            transform: scale(0.92);
        }

        .header-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ============================================================
           КАРТА — как в Blink (на весь экран)
           ============================================================ */
        .map-wrapper {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 50vh;
            margin: 12px 16px 0;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg);
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            transition: background var(--transition), border var(--transition);
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .map-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            padding: 30px;
            text-align: center;
        }

        .map-placeholder .icon {
            font-size: 56px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .map-placeholder .title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* ============================================================
           ПЛАВАЮЩАЯ ПАНЕЛЬ СТАТУСА (как в Blink)
           ============================================================ */
        .floating-panel {
            position: relative;
            z-index: 5;
            margin: -20px 16px 0;
            padding: 16px 20px;
            background: var(--card);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border-radius: var(--radius);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
            transition: background var(--transition), border var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-info .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.inactive {
            background: var(--text-muted);
        }
        .dot.active {
            background: var(--success);
            box-shadow: 0 0 20px var(--success-glow);
            animation: pulse-dot 2s infinite;
        }
        .dot.error {
            background: var(--danger);
        }

        .status-info .label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .status-info .label strong {
            color: var(--text);
            font-weight: 600;
        }

        .coords-display {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 30px;
            transition: background var(--transition);
        }

        /* ============================================================
           ССЫЛКА
           ============================================================ */
        .link-box {
            position: relative;
            z-index: 5;
            margin: 10px 16px 0;
            padding: 12px 16px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            display: none;
            transition: background var(--transition), border var(--transition);
        }

        .link-box.show {
            display: block;
        }

        .link-box .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .link-box .url {
            color: var(--primary);
            margin-top: 4px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            word-break: break-all;
        }

        /* ============================================================
           КНОПКИ — как в Blink (круглые, плавающие)
           ============================================================ */
        .actions {
            position: relative;
            z-index: 5;
            padding: 12px 16px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            flex: 1;
            min-width: 56px;
            letter-spacing: 0.2px;
            position: relative;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 24px var(--primary-glow);
        }

        .btn-primary:active {
            box-shadow: 0 2px 12px var(--primary-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: rgba(244, 36, 94, 0.12);
            color: var(--danger);
            border: 1px solid rgba(244, 36, 94, 0.15);
        }

        .btn-danger:active {
            background: rgba(244, 36, 94, 0.2);
        }

        .btn-outline {
            background: var(--card);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            flex: 0.5;
        }

        .btn-outline:active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-google {
            background: #ea4335;
            color: #fff;
            flex: 0.5;
            box-shadow: 0 4px 20px rgba(234, 67, 53, 0.2);
        }

        .btn-google:active {
            background: #d33426;
            transform: scale(0.95);
        }

        /* ============================================================
           TOAST — как в Blink
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
        }
        .toast.error {
            border-color: var(--danger);
        }
        .toast.info {
            border-color: var(--primary);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 500px) {
            .header {
                padding: 12px 16px 10px;
            }
            .header h1 {
                font-size: 17px;
            }
            .header h1 span {
                display: none;
            }
            .avatar {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .avatar .online-dot {
                width: 10px;
                height: 10px;
            }
            .map-wrapper {
                margin: 8px 12px 0;
                min-height: 40vh;
                border-radius: 20px;
            }
            .floating-panel {
                margin: -14px 12px 0;
                padding: 12px 16px;
                border-radius: 20px;
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .status-info .label {
                font-size: 13px;
            }
            .coords-display {
                font-size: 12px;
                padding: 3px 10px;
            }
            .actions {
                padding: 8px 12px 16px;
                gap: 8px;
            }
            .btn {
                font-size: 13px;
                padding: 12px 16px;
                border-radius: 40px;
            }
            .link-box {
                margin: 8px 12px 0;
                padding: 10px 14px;
            }
            .toast {
                bottom: 80px;
                padding: 12px 20px;
                font-size: 13px;
                border-radius: 40px;
            }
        }

        @media (min-height: 750px) {
            .map-wrapper {
                min-height: 55vh;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    ФОН С ГРАДИЕНТОМ
    ============================================================ -->
    <div class="bg-gradient"></div>

    <!-- ============================================================
    ВЕРХНЯЯ ПАНЕЛЬ
    ============================================================ -->
    <div class="header">
        <div class="header-left">
            <div class="avatar" id="avatar">
                👤
                <span class="online-dot" id="onlineDot"></span>
            </div>
            <h1>Blink <span>• 2.0</span></h1>
        </div>
        <div class="header-actions">
            <button class="header-btn" id="themeToggle" onclick="toggleTheme()" title="Сменить тему">
                🌙
            </button>
        </div>
    </div>

    <!-- ============================================================
    КАРТА
    ============================================================ -->
    <div class="map-wrapper" id="mapWrapper">
        <div class="map-placeholder" id="mapPlaceholder">
            <div class="icon">🗺️</div>
            <div class="title">Начните отслеживание</div>
            <div style="font-size:13px;opacity:0.4;margin-top:4px;">Нажмите «Начать» чтобы показать местоположение</div>
        </div>
        <iframe id="mapFrame" style="display:none;"></iframe>
    </div>

    <!-- ============================================================
    ПЛАВАЮЩАЯ ПАНЕЛЬ СТАТУСА
    ============================================================ -->
    <div class="floating-panel" id="floatingPanel">
        <div class="status-info">
            <span class="dot inactive" id="statusDot"></span>
            <span class="label" id="statusText">Ожидание запуска</span>
        </div>
        <span class="coords-display" id="coordsDisplay">—</span>
    </div>

    <!-- ============================================================
    ССЫЛКА
    ============================================================ -->
    <div class="link-box" id="linkBox">
        <div class="label">🔗 Ссылка для передачи</div>
        <div class="url" id="trackLink"></div>
    </div>

    <!-- ============================================================
    КНОПКИ
    ============================================================ -->
    <div class="actions">
        <button class="btn btn-primary" id="startBtn" onclick="startTracking()">
            ▶ Начать
        </button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopTracking()" style="display:none;">
            ⏹ Стоп
        </button>
        <button class="btn btn-outline" id="copyBtn" onclick="copyLink()" style="display:none;" title="Скопировать ссылку">
            📋
        </button>
        <button class="btn btn-google" id="googleBtn" onclick="openGoogleMaps()" style="display:none;" title="Открыть в Google Maps">
            🗺️
        </button>
    </div>

    <!-- ============================================================
    TOAST
    ============================================================ -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        // 1. ТЁМНАЯ ТЕМА
        // ============================================================
        const themeToggle = document.getElementById('themeToggle');

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', next);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        // ============================================================
        // 2. ОСНОВНАЯ ЛОГИКА
        // ============================================================

        let watchId = null;
        let isTracking = false;
        let lastCoords = null;
        let lastNotifyCoords = null;

        const mapPlaceholder = document.getElementById('mapPlaceholder');
        const mapFrame = document.getElementById('mapFrame');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const copyBtn = document.getElementById('copyBtn');
        const googleBtn = document.getElementById('googleBtn');
        const linkBox = document.getElementById('linkBox');
        const trackLink = document.getElementById('trackLink');
        const toast = document.getElementById('toast');
        const onlineDot = document.getElementById('onlineDot');

        let toastTimer = null;

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        function updateStatus(text, state) {
            statusText.textContent = text;
            statusDot.className = 'dot ' + state;

            if (state === 'active') {
                onlineDot.style.display = 'block';
            } else {
                onlineDot.style.display = 'none';
            }
        }

        function showMap(lat, lon) {
            mapPlaceholder.style.display = 'none';
            mapFrame.style.display = 'block';
            mapFrame.src =
                `https://www.openstreetmap.org/export/embed.html?bbox=${lon - 0.025},${lat - 0.025},${lon + 0.025},${lat + 0.025}&layer=mapnik&marker=${lat},${lon}`;
        }

        function updateCoords(lat, lon) {
            coordsDisplay.textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        }

        function generateLink(lat, lon) {
            const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
            trackLink.textContent = url;
            linkBox.className = 'link-box show';
            copyBtn.style.display = 'flex';
            googleBtn.style.display = 'flex';
            return url;
        }

        function copyLink() {
            const text = trackLink.textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ Ссылка скопирована!', 'success');
                });
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ Ссылка скопирована!', 'success');
            }
        }

        function openGoogleMaps() {
            if (lastCoords) {
                const url = `https://www.google.com/maps?q=${lastCoords.lat},${lastCoords.lon}`;
                window.open(url, '_blank');
            } else {
                showToast('Нет координат', 'error');
            }
        }

        function notifyIfMoved(lat, lon) {
            if (!lastNotifyCoords) {
                lastNotifyCoords = { lat, lon };
                return;
            }
            const dist = Math.sqrt(
                Math.pow(lat - lastNotifyCoords.lat, 2) +
                Math.pow(lon - lastNotifyCoords.lon, 2)
            );
            if (dist > 0.0003) {
                showToast('📍 Местоположение изменилось!', 'info');
                if (navigator.vibrate) navigator.vibrate(30);
                lastNotifyCoords = { lat, lon };
            }
        }

        // ============================================================
        // 3. СТАРТ / СТОП
        // ============================================================

        function startTracking() {
            if (!navigator.geolocation) {
                showToast('❌ Браузер не поддерживает геолокацию', 'error');
                return;
            }

            if (isTracking) {
                showToast('⏳ Уже отслеживается', 'info');
                return;
            }

            showToast('⏳ Запрос доступа...', 'info');
            updateStatus('Запрос разрешения...', 'info');

            startBtn.disabled = true;
            startBtn.textContent = '⏳ ...';

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    lastCoords = { lat, lon };

                    if (!isTracking) {
                        isTracking = true;
                        startBtn.style.display = 'none';
                        stopBtn.style.display = 'flex';
                    }

                    showMap(lat, lon);
                    updateCoords(lat, lon);
                    generateLink(lat, lon);
                    updateStatus('Активно', 'active');
                    notifyIfMoved(lat, lon);

                    const url = window.location.origin + window.location.pathname + `?lat=${lat}&lon=${lon}`;
                    window.history.replaceState({}, '', url);
                },
                (err) => {
                    let msg = 'Ошибка GPS';
                    if (err.code === 1) msg = '❌ Доступ запрещён! Разреши в браузере.';
                    else if (err.code === 2) msg = '❌ Сигнал GPS не найден';
                    else if (err.code === 3) msg = '❌ Таймаут';
                    showToast(msg, 'error');
                    updateStatus('Ошибка', 'error');
                    isTracking = false;
                    startBtn.disabled = false;
                    startBtn.textContent = '▶ Начать';
                    startBtn.style.display = 'flex';
                    stopBtn.style.display = 'none';
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 3000,
                    timeout: 15000
                }
            );
        }

        function stopTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isTracking = false;
            lastNotifyCoords = null;
            startBtn.style.display = 'flex';
            startBtn.disabled = false;
            startBtn.textContent = '▶ Начать';
            stopBtn.style.display = 'none';
            updateStatus('Остановлено', 'inactive');
            showToast('⏹ Отслеживание остановлено', 'info');
        }

        // ============================================================
        // 4. ЗАГРУЗКА ИЗ URL
        // ============================================================

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const lat = parseFloat(params.get('lat'));
            const lon = parseFloat(params.get('lon'));

            if (!isNaN(lat) && !isNaN(lon)) {
                lastCoords = { lat, lon };
                showMap(lat, lon);
                updateCoords(lat, lon);
                generateLink(lat, lon);
                updateStatus('Просмотр', 'active');
                showToast('📍 Местоположение загружено', 'success');
            } else {
                updateStatus('Ожидание', 'inactive');
            }
        };
    </script>
</body>
